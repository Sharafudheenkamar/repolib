<!DOCTYPE html>
<html>
<head>
    <title>Student View</title>
</head>
<body>

    <h1>Student Details</h1>

    <table border="1" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.age }}</td>
            <td>{{ student.course }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
