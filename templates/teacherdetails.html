<!DOCTYPE html>
<html>
<head>
    <title>Teacher Details</title>
    <style>
        body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f7fafc}
        table{border-collapse:collapse;width:100%;max-width:800px;margin:0 auto;background:#fff}
        th,td{padding:12px;border:1px solid #e2e8f0;text-align:left}
        th{background:#edf2f7}
        a.delete{color:#c53030}
        .actions{margin:16px auto;text-align:center}
    </style>
</head>
<body>
    <h1 style="text-align:center">Teacher Details</h1>
    <div class="actions"><a href="/teacher/add/">Add Teacher</a> • <a href="/">Home</a></div>
    <table>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
        {% for t in teachers %}
        <tr>
            <td>{{ t.name }}</td>
            <td>{{ t.subject }}</td>
            <td>{{ t.phone }}</td>
            <td><a class="delete" href="/teacher/delete/{{ t.id }}/">Delete</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
