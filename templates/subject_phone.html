<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Subject and Phone</title>
    <style>
        body{
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
        }
        form{
            background:#fff;
            padding:24px;
            border-radius:8px;
            box-shadow:0 6px 18px rgba(0,0,0,0.08);
            width:320px;
        }
        label{display:block;margin-top:12px;font-weight:600}
        input[type="text"], input[type="tel"]{width:100%;padding:8px;margin-top:6px;border:1px solid #ccc;border-radius:4px}
        input[type="submit"]{margin-top:16px;width:100%;padding:10px;background:#0b79d0;color:#fff;border:none;border-radius:6px;cursor:pointer}
        .links{margin-top:12px;font-size:14px}
    </style>
</head>
<body>
    <form method="POST">
        {% csrf_token %}
        <h2>Subject & Phone</h2>
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="Enter subject" required>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter phone number" pattern="[0-9+\-() ]+" required>

        <input type="submit" value="Submit">
        <div class="links">
            <a href="/">Home</a> • <a href="/student/">Students</a>
        </div>
    </form>
</body>
</html>
